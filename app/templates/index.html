<!DOCTYPE html>
<html>
<head>
    <title>Pawty Patrol</title>
    <link rel="stylesheet" href="/static/style.css">
</head>
<body>

<div class="container">
    <h1>🐶 Pawty Patrol</h1>
    <p class="subtitle">AI-powered doggy business detector</p>

    <form action="/analyze" method="post" enctype="multipart/form-data">
        <div class="upload-box">
            <input type="file" name="file" id="file-input" required>
            <div class="upload-content">
                <span class="icon">📁</span>
                <p>Drag & drop a video or <strong>browse</strong></p>
            </div>
            <button type="submit">Analyze Video</button>
        </div>
    </form>

    {% if results %}
    <div class="results">
        <h2>📍 Detected Events</h2>
        {% for r in results %}
            <div class="event">
                🕒 {{ r }}
            </div>
        {% endfor %}
    {% else %}
        <h3>No Events Detected</h3>
    </div>
    {% endif %}

    {% if images %}
    <div class="results">
        <h2>🖼️ Detected Frames</h2>
        <div class="images">
            {% for img in images %}
                <img src="{{ img }}">
            {% endfor %}
        </div>
    </div>
    {% endif %}
</div>
<script>
    const fileInput = document.getElementById('file-input');
    const uploadText = document.querySelector('.upload-content p');

    fileInput.addEventListener('change', (e) => {
        if (fileInput.files.length > 0) {
            uploadText.innerHTML = `Selected: <strong>${fileInput.files[0].name}</strong>`;
        }
    });
</script>
</body>
</html>
